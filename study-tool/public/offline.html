<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline – FernUni Study Organizer</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: system-ui, -apple-system, sans-serif;
        background: #f5f3ff;
        color: #1e1b4b;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        padding: 1.5rem;
      }
      .card {
        background: white;
        border-radius: 1.25rem;
        padding: 2.5rem 2rem;
        max-width: 420px;
        width: 100%;
        text-align: center;
        box-shadow: 0 4px 24px rgba(99,102,241,0.12);
      }
      .icon {
        font-size: 3.5rem;
        margin-bottom: 1.25rem;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 0.75rem;
        color: #4f46e5;
      }
      p {
        color: #6b7280;
        line-height: 1.6;
        margin-bottom: 1.75rem;
      }
      button {
        background: #6366f1;
        color: white;
        border: none;
        border-radius: 0.75rem;
        padding: 0.75rem 2rem;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
      }
      button:hover { background: #4f46e5; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">📚</div>
      <h1>Du bist offline</h1>
      <p>
        Keine Internetverbindung. Bereits geladene Karteikarten und Notizen
        sind weiterhin im Cache verfügbar – stelle eine Verbindung her,
        um alle Inhalte zu nutzen.
      </p>
      <button onclick="location.reload()">Erneut versuchen</button>
    </div>
  </body>
</html>
